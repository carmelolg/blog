<script>
(function() {
  const COOKIE_NAME = 'shizuka-cookie-consent';
  const COOKIE_DURATION = 365;
  
  function getCookie(name) {
    const nameEQ = name + "=";
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
      cookie = cookie.trim();
      if (cookie.indexOf(nameEQ) === 0) return cookie.substring(nameEQ.length);
    }
    return null;
  }
  
  function setCookie(name, value, days) {
    const expires = new Date();
    expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
    document.cookie = name + "=" + value + ";expires=" + expires.toUTCString() + ";path=/";
  }
  
  function initCookieConsent() {
    const banner = document.getElementById('cookie-consent-banner');
    if (!banner) return;
    
    const acceptBtn = document.getElementById('cookie-accept');
    const rejectBtn = document.getElementById('cookie-reject');
    
    const consentValue = getCookie(COOKIE_NAME);
    
    if (consentValue) {
      window.cookieConsent = (consentValue === 'accepted');
      banner.classList.add('cookie-hidden');
    } else {
      banner.classList.remove('cookie-hidden');
    }
    
    acceptBtn.addEventListener('click', function() {
      setCookie(COOKIE_NAME, 'accepted', COOKIE_DURATION);
      window.cookieConsent = true;
      banner.classList.add('cookie-hidden');
      if (typeof gtag !== 'undefined') {
        gtag('event', 'cookie_consent', {'consent_type': 'accepted'});
      }
    });
    
    rejectBtn.addEventListener('click', function() {
      setCookie(COOKIE_NAME, 'rejected', COOKIE_DURATION);
      window.cookieConsent = false;
      banner.classList.add('cookie-hidden');
    });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCookieConsent);
  } else {
    initCookieConsent();
  }
})();
</script>
